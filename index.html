<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Scanner Lab</title>
<!--
  Scanner Lab — compare decoders OUTSIDE the app to find one simple,
  universal fix for the hard laser-etched tags ( before
  touching 
  ENGINES (pick one or "All"):
    1. ZXing (app)   — the EXACT library the web app uses today:
                       @zxing/browser BrowserMultiFormatReader + @zxing/library.
                       Loaded from the same package versions in package.json
                       (@zxing/browser 0.1.5, @zxing/library 0.21.3).
    2. Native ML     — the browser BarcodeDetector API (= ML Kit on Android
                       Chrome). NOT available in iOS Safari / iOS PWA.
    3. zxing-wasm    — zxing-cpp compiled to WebAssembly. A far stronger
                       decoder than the old pure-JS ZXing, runs in EVERY
                       browser incl. iPhone. tryHarder + tryInvert on.
                       >>> This is the candidate "one universal fix". <<<

  No preprocessing knobs — per your call, we only test real decoders.
  Known-good  sample decodes to a string containing .
-->
<style>
  :root{--bg:#0b0e14;--panel:#151a23;--panel2:#1d2430;--border:#2a3340;--text:#e6edf3;--muted:#8b97a7;--accent:#4f8cff;--good:#3fb950;--bad:#f85149;--warn:#d29922}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:env(safe-area-inset-top) 12px calc(env(safe-area-inset-bottom) + 24px)}
  h1{font-size:18px;margin:14px 2px 4px}
  .sub{color:var(--muted);font-size:13px;margin:0 2px 12px}
  code{background:var(--panel2);padding:1px 5px;border-radius:5px;font-size:12px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  label.field{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
  select,button{font:inherit;color:var(--text);background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;cursor:pointer}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  button.toggle[aria-pressed=true]{background:var(--accent);border-color:var(--accent);color:#fff}
  button:disabled{opacity:.4}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-wrap:wrap}
  .seg button{border:0;border-radius:0;background:var(--panel2)}
  .seg button[aria-pressed=true]{background:var(--accent);color:#fff}
  .videowrap{position:relative;background:#000;border-radius:14px;overflow:hidden;aspect-ratio:1}
  video{display:block;width:100%;height:100%;object-fit:cover}
  .reticle{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .reticle>div{width:78%;height:42%;border:2px solid rgba(255,255,255,.85);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.38)}
  .result{font-size:14px;word-break:break-all}
  .result.hit{color:var(--good)} .result.none{color:var(--muted)}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:var(--muted);margin-left:6px}
  .badge.good{color:var(--good);border-color:var(--good)}
  .log{font:12px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);max-height:170px;overflow:auto;white-space:pre-wrap;margin-top:8px}
  .hint{font-size:12px;color:var(--warn);margin-top:8px}
  .ok{color:var(--good)} .err{color:var(--bad)} .mut{color:var(--muted)}
  .preview{width:100%;border-radius:10px;border:1px solid var(--border);margin-top:8px;display:none}
  .preview.show{display:block}
  .status{font-size:11px;color:var(--muted);margin-left:6px}
</style>
</head>
<body>
  <h1>Scanner Lab</h1>
  <p class="sub">Find one universal decoder fix. <code>ZXing (app)</code> = exactly what the app uses now. Sample should read <code>id=171338987</code>.</p>

  <div class="card">
    <div class="seg" id="engineSeg" role="group" aria-label="Engine" style="margin-bottom:10px">
      <button data-engine="all" aria-pressed="true">All</button>
      <button data-engine="zxing" aria-pressed="false">ZXing (app)</button>
      <button data-engine="native" aria-pressed="false">Native ML</button>
      <button data-engine="wasm" aria-pressed="false">zxing-wasm</button>
    </div>
    <div id="engineStatus" class="status"></div>

    <div class="videowrap"><video id="video" playsinline muted></video><div class="reticle"><div></div></div></div>

    <div class="row" style="margin-top:10px">
      <button id="startBtn" class="primary">Start camera</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="torchBtn" class="toggle" aria-pressed="false" disabled>🔦 Torch</button>
      <button id="flipBtn" disabled>↺ Flip</button>
      <label class="field" style="flex:0 0 120px">Zoom <input id="zoom" type="range" min="1" max="5" step="0.1" value="1" disabled /></label>
    </div>
    <div class="hint" id="secureHint" style="display:none"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between"><strong>Result</strong><button id="clearLog" class="mut" style="font-size:12px;padding:4px 8px">clear log</button></div>
    <div id="result" class="result none">— no scan yet —</div>
    <div class="log" id="log"></div>
  </div>

  <div class="card">
    <strong>Test a still photo</strong>
    <p class="sub" style="margin:6px 0 10px">Works even when opened from a file (no camera/HTTPS needed). Decodes with all three engines side by side.</p>
    <input id="file" type="file" accept="image/*" />
    <img id="preview" class="preview" alt="preview" />
    <div id="fileResult" class="result none" style="margin-top:10px">— no photo decoded —</div>
  </div>

<!-- The EXACT libraries the app depends on (same versions as apps/web/package.json) -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>
<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const video = $('video'), resultEl = $('result'), logEl = $('log');
  let engine = 'all', stream = null, track = null, loopId = null, facing = 'environment';
  let zxingReader = null, nativeDetector = null, wasmRead = null;
  const nativeSupported = ('BarcodeDetector' in window);

  const log = (m) => { logEl.textContent = `[${new Date().toLocaleTimeString()}] ${m}\n` + logEl.textContent; };
  const setResult = (el, t, cls, b) => { el.className = 'result ' + cls; el.innerHTML = t + (b || ''); };

  // ---------- engine availability banner ----------
  function refreshStatus() {
    const z = (window.ZXingBrowser && window.ZXingBrowser.BrowserMultiFormatReader) ? 'ZXing✅' : 'ZXing❌(CDN?)';
    const n = nativeSupported ? 'NativeML✅' : 'NativeML❌(iOS/Firefox)';
    const w = wasmRead ? 'wasm✅' : 'wasm⏳(loads on first use)';
    $('engineStatus').textContent = `${z}  ·  ${n}  ·  ${w}`;
  }

  // ---------- ZXing (the app's exact reader) ----------
  function ensureZXing() {
    if (zxingReader) return zxingReader;
    const ZB = window.ZXingBrowser;
    if (!ZB || !ZB.BrowserMultiFormatReader) throw new Error('ZXing (@zxing/browser) failed to load from CDN');
    zxingReader = new ZB.BrowserMultiFormatReader(); // identical to barcode-scanner.tsx (no hints)
    return zxingReader;
  }
  function tryZXing(canvas) {
    try { const r = ensureZXing().decodeFromCanvas(canvas); if (r && r.getText) return { value: r.getText(), fmt: 'zxing' }; }
    catch (_) {} // NotFoundException while nothing is in view
    return null;
  }

  // ---------- Native BarcodeDetector (ML Kit on Android) ----------
  async function tryNative(source) {
    if (!nativeSupported) return null;
    if (!nativeDetector) nativeDetector = new BarcodeDetector();
    const codes = await nativeDetector.detect(source);
    return (codes && codes.length) ? { value: codes[0].rawValue, fmt: codes[0].format } : null;
  }

  // ---------- zxing-wasm (zxing-cpp) — the universal candidate ----------
  let wasmLoading = null;
  async function ensureWasm() {
    if (wasmRead) return wasmRead;
    if (!wasmLoading) {
      wasmLoading = (async () => {
        log('loading zxing-wasm…');
        const mod = await import('https://esm.sh/zxing-wasm@2.2.4/reader');
        // Pin the .wasm binary so it loads reliably from the CDN.
        if (mod.prepareZXingModule) {
          mod.prepareZXingModule({
            overrides: { locateFile: (p, prefix) => p.endsWith('.wasm')
              ? 'https://cdn.jsdelivr.net/npm/zxing-wasm@2.2.4/dist/reader/zxing_reader.wasm' : prefix + p },
            fireImmediately: true,
          });
        }
        wasmRead = mod.readBarcodes;
        log('zxing-wasm ready ✅'); refreshStatus();
        return wasmRead;
      })().catch((e) => { log('zxing-wasm load failed: ' + e.message); throw e; });
    }
    return wasmLoading;
  }
  async function tryWasm(imageData) {
    const read = await ensureWasm();
    const res = await read(imageData, { tryHarder: true, tryInvert: true, tryRotate: true, maxNumberOfSymbols: 1 });
    return (res && res.length && res[0].text) ? { value: res[0].text, fmt: res[0].format } : null;
  }

  // ---------- shared frame grabber ----------
  const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d', { willReadFrequently: true });
  function grab(src, w, h) { cvs.width = w; cvs.height = h; ctx.drawImage(src, 0, 0, w, h); return cvs; }

  // ---------- live loop ----------
  async function scanFrame() {
    const w = video.videoWidth, h = video.videoHeight; if (!w || !h) return;
    const canvas = grab(video, w, h);
    const want = (e) => engine === 'all' || engine === e;
    let hit = null, who = '';
    if (!hit && want('zxing'))  { const r = tryZXing(canvas); if (r) { hit = r; who = 'ZXing (app)'; } }
    if (!hit && want('native')) { try { const r = await tryNative(canvas); if (r) { hit = r; who = 'Native ML'; } } catch(_){} }
    if (!hit && want('wasm'))   { try { const r = await tryWasm(ctx.getImageData(0,0,w,h)); if (r) { hit = r; who = 'zxing-wasm'; } } catch(_){} }
    if (hit) { setResult(resultEl, hit.value, 'hit', `<span class="badge good">${who}</span>`); log(`HIT via ${who}: ${hit.value}`); navigator.vibrate && navigator.vibrate(120); }
  }
  function loop() { if (!stream) return; scanFrame().finally(() => { loopId = setTimeout(loop, 200); }); }

  // ---------- camera ----------
  async function start() {
    if (!window.isSecureContext) {
      const h = $('secureHint'); h.style.display = 'block';
      h.innerHTML = '⚠️ Camera needs HTTPS/localhost. You opened over <code>'+location.protocol+'</code> so the camera is blocked. Use the still-photo box below, or host on GitHub Pages (see README).';
    }
    try {
      ensureZXing();
      if (engine === 'all' || engine === 'wasm') ensureWasm().catch(()=>{});
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: facing }, width: { ideal: 1920 }, height: { ideal: 1920 } }, audio: false });
      video.srcObject = stream; await video.play();
      track = stream.getVideoTracks()[0]; log('camera: ' + (track.label || 'video'));
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      $('torchBtn').disabled = !caps.torch;
      if (caps.zoom) { const z=$('zoom'); z.disabled=false; z.min=caps.zoom.min; z.max=caps.zoom.max; z.step=caps.zoom.step||0.1; z.value=(track.getSettings().zoom)||caps.zoom.min; } else $('zoom').disabled = true;
      $('startBtn').disabled = true; $('stopBtn').disabled = false; $('flipBtn').disabled = false;
      loop();
    } catch (e) { log('camera error: ' + e.message); setResult(resultEl, 'Camera error: ' + e.message, 'none', ''); }
  }
  function stop() {
    if (loopId) { clearTimeout(loopId); loopId = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    track = null; video.srcObject = null;
    ['stopBtn','torchBtn','flipBtn'].forEach(id=>$(id).disabled=true); $('zoom').disabled=true;
    $('startBtn').disabled=false; $('torchBtn').setAttribute('aria-pressed','false'); log('stopped');
  }
  $('torchBtn').addEventListener('click', async () => {
    if (!track) return; const b=$('torchBtn'); const on=b.getAttribute('aria-pressed')!=='true';
    try { await track.applyConstraints({ advanced:[{torch:on}] }); b.setAttribute('aria-pressed',String(on)); log('torch '+(on?'on':'off')); } catch(e){ log('torch failed: '+e.message); }
  });
  $('zoom').addEventListener('input', async () => { if (track) try { await track.applyConstraints({ advanced:[{zoom:parseFloat($('zoom').value)}] }); } catch(_){} });
  $('flipBtn').addEventListener('click', async () => { facing = facing==='environment'?'user':'environment'; stop(); await start(); });
  $('startBtn').addEventListener('click', start);
  $('stopBtn').addEventListener('click', stop);
  $('clearLog').addEventListener('click', () => logEl.textContent='');
  $('engineSeg').addEventListener('click', (e) => { const b=e.target.closest('button[data-engine]'); if(!b) return; engine=b.dataset.engine; [...$('engineSeg').children].forEach(c=>c.setAttribute('aria-pressed',String(c===b))); log('engine → '+engine); if (engine==='wasm'||engine==='all') ensureWasm().catch(()=>{}); });

  // ---------- still photo (all engines) ----------
  $('file').addEventListener('change', async (e) => {
    const f = e.target.files[0]; if (!f) return;
    const url = URL.createObjectURL(f), img = new Image();
    img.onload = async () => {
      $('preview').src = url; $('preview').classList.add('show');
      const out = $('fileResult'), lines = [];
      const c = grab(img, img.naturalWidth, img.naturalHeight);
      const rz = tryZXing(c); lines.push('ZXing (app): ' + (rz ? '✅ '+rz.value : '❌ no read'));
      if (nativeSupported) { try { const rn = await tryNative(img); lines.push('Native ML: ' + (rn ? '✅ '+rn.value : '❌ no read')); } catch(err){ lines.push('Native ML: error '+err.message); } }
      else lines.push('Native ML: (not supported in this browser)');
      try { const rw = await tryWasm(ctx.getImageData(0,0,c.width,c.height)); lines.push('zxing-wasm: ' + (rw ? '✅ '+rw.value : '❌ no read')); }
      catch(err){ lines.push('zxing-wasm: error '+err.message); }
      const anyHit = lines.some(l=>l.includes('✅'));
      out.className = 'result ' + (anyHit?'hit':'none');
      out.innerHTML = lines.map(l=> l.includes('✅')?`<span class="ok">${l}</span>`:(l.includes('❌')?`<span class="err">${l}</span>`:`<span class="mut">${l}</span>`)).join('<br>');
      log('photo decoded — see box');
    };
    img.src = url;
  });

  // ---------- boot ----------
  try { ensureZXing(); log('ZXing (@zxing/browser) loaded ✅'); } catch (e) { log(e.message); }
  log('Native BarcodeDetector: ' + (nativeSupported ? 'supported ✅' : 'NOT supported ❌ (iOS/Firefox)'));
  refreshStatus();
  if (!window.isSecureContext) { $('secureHint').style.display='block'; $('secureHint').innerHTML='ℹ️ Not secure ('+location.protocol+'). Live camera blocked — use the still-photo box, or host on HTTPS.'; }
})();
</script>
</body>
</html>
